<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Inter', sans-serif; }
  canvas { width: 100%; height: 100%; display: block; }
  #loader {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0a0a; color: #888; font-size: 14px; gap: 16px;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-bar { width: 200px; height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
  .loader-fill { height: 100%; background: #d4a053; border-radius: 2px; width: 0%; transition: width 0.3s; }
  .loader-text { color: #555; font-size: 12px; }
</style>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
    }
  }
</script>
<script type="module">
  import * as THREE from "three";
  import { SplatMesh, SplatLoader } from "@sparkjsdev/spark";

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Loading UI
  const loaderEl = document.getElementById('loader');
  const fillEl = document.getElementById('loaderFill');
  const textEl = document.getElementById('loaderText');

  // ── Orbit controls (inline, no import needed) ──
  // Simple orbit: drag to rotate around a center point, scroll to zoom
  const orbitState = {
    theta: 0,        // horizontal angle
    phi: Math.PI / 2.3, // vertical angle (slightly above horizon)
    radius: 0.8,     // distance from center
    target: new THREE.Vector3(0, 0, 0),
    dragging: false,
    prevX: 0,
    prevY: 0,
    minRadius: 0.2,
    maxRadius: 3.0,
    minPhi: 0.3,
    maxPhi: Math.PI - 0.3
  };

  function updateCamera() {
    const s = orbitState;
    camera.position.set(
      s.target.x + s.radius * Math.sin(s.phi) * Math.sin(s.theta),
      s.target.y + s.radius * Math.cos(s.phi),
      s.target.z + s.radius * Math.sin(s.phi) * Math.cos(s.theta)
    );
    camera.lookAt(s.target);
  }

  renderer.domElement.addEventListener('mousedown', (e) => {
    orbitState.dragging = true;
    orbitState.prevX = e.clientX;
    orbitState.prevY = e.clientY;
    renderer.domElement.style.cursor = 'grabbing';
  });
  window.addEventListener('mouseup', () => {
    orbitState.dragging = false;
    renderer.domElement.style.cursor = 'grab';
  });
  window.addEventListener('mousemove', (e) => {
    if (!orbitState.dragging) return;
    const dx = e.clientX - orbitState.prevX;
    const dy = e.clientY - orbitState.prevY;
    orbitState.theta -= dx * 0.005;
    orbitState.phi = Math.max(orbitState.minPhi, Math.min(orbitState.maxPhi, orbitState.phi - dy * 0.005));
    orbitState.prevX = e.clientX;
    orbitState.prevY = e.clientY;
  });
  renderer.domElement.addEventListener('wheel', (e) => {
    e.preventDefault();
    orbitState.radius = Math.max(orbitState.minRadius, Math.min(orbitState.maxRadius, orbitState.radius + e.deltaY * 0.001));
  }, { passive: false });

  // Touch support
  let touchPrev = null;
  renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchPrev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  });
  renderer.domElement.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1 && touchPrev) {
      const dx = e.touches[0].clientX - touchPrev.x;
      const dy = e.touches[0].clientY - touchPrev.y;
      orbitState.theta -= dx * 0.005;
      orbitState.phi = Math.max(orbitState.minPhi, Math.min(orbitState.maxPhi, orbitState.phi - dy * 0.005));
      touchPrev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    e.preventDefault();
  }, { passive: false });
  renderer.domElement.addEventListener('touchend', () => { touchPrev = null; });

  renderer.domElement.style.cursor = 'grab';

  // ── Forward arrow keys to parent for slide navigation ──
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      e.stopPropagation();
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'keydown', key: e.key }, '*');
      }
    }
  }, true);

  // Load splat
  const loader = new SplatLoader();
  loader.loadAsync("assets/2024-talk/extracted/rustic_kitchen_with_natural_light_500k.spz", (event) => {
    if (event.type === "progress" && event.lengthComputable) {
      const pct = Math.round((event.loaded / event.total) * 100);
      fillEl.style.width = pct + '%';
      textEl.textContent = pct + '%';
    }
  }).then((packedSplats) => {
    const splat = new SplatMesh({ packedSplats });
    splat.quaternion.set(1, 0, 0, 0);
    splat.position.set(0, 0, 0);
    scene.add(splat);

    setTimeout(() => loaderEl.classList.add('hidden'), 300);
  }).catch((err) => {
    textEl.textContent = 'Failed to load';
    console.warn(err);
  });

  // Handle resize with debounce to avoid fullscreen glitches
  let resizeTimer;
  function handleResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  }
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(handleResize, 100);
  });
  // Also handle fullscreen changes explicitly
  document.addEventListener('fullscreenchange', () => {
    setTimeout(handleResize, 200);
  });

  // Initial camera position
  updateCamera();

  renderer.setAnimationLoop(function animate() {
    // Gentle auto-orbit when not dragging
    if (!orbitState.dragging) {
      orbitState.theta += 0.0012;
    }
    updateCamera();
    renderer.render(scene, camera);
  });
</script>
</head>
<body>
  <div id="loader">
    <div>Loading 3D scene...</div>
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    <div class="loader-text" id="loaderText">0%</div>
  </div>
</body>
</html>
