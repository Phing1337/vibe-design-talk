<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wide & Deep — 3D Exploration</title>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0d0b; --signal: #c43e1c; --text: #f0ede8;
      --text-dim: rgba(255,255,255,0.25);
      --font-display: 'Young Serif', Georgia, serif;
      --font-body: 'Inter', sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-body);
      margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh;
    }

    .layout {
      display: grid; grid-template-columns: 400px 1fr;
      width: 100%; height: 100%;
    }

    .left-panel {
      display: flex; flex-direction: column; justify-content: center;
      padding: 60px 28px 28px;
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto; gap: 0;
    }

    #viewer { width: 100%; height: 100%; cursor: grab; }
    #viewer:active { cursor: grabbing; }

    /* ── Panel typography ── */
    .panel-label {
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
      margin-bottom: 6px;
    }
    .panel-title {
      font-family: var(--font-display); font-size: 1.8rem;
      font-weight: 400; color: var(--text); letter-spacing: -0.02em;
    }
    .panel-sub {
      font-size: 0.6rem; color: rgba(255,255,255,0.25); line-height: 1.5;
      margin-top: 4px;
    }

    /* ── Sections ── */
    .panel-section {
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .section-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.18);
      margin-bottom: 8px;
    }

    /* ── Action buttons ── */
    .action-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .sim-btn {
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.02em; color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 10px 18px; cursor: pointer;
      transition: all 0.18s ease; user-select: none;
    }
    .sim-btn:hover {
      color: var(--signal); background: rgba(196,62,28,0.06);
      border-color: rgba(196,62,28,0.25);
    }

    /* ── Checkboxes ── */
    .ck-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 12px; }
    .ck-row {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      padding: 3px 0; user-select: none;
    }
    .ck-input { display: none; }
    .ck-box {
      width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.02);
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .ck-box::after {
      content: ''; width: 8px; height: 8px; border-radius: 1px;
      background: var(--signal); transform: scale(0); transition: transform 0.18s ease;
    }
    .ck-input:checked + .ck-box { border-color: var(--signal); background: rgba(196,62,28,0.12); }
    .ck-input:checked + .ck-box::after { transform: scale(1); }
    .ck-text { font-size: 0.82rem; color: rgba(255,255,255,0.35); transition: color 0.15s ease; }
    .ck-input:checked ~ .ck-text { color: rgba(255,255,255,0.7); }

    /* ── Sliders ── */
    .slider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; }
    .slider-row { display: flex; align-items: center; gap: 6px; }
    .slider-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      min-width: 32px;
    }
    .slider-value {
      font-size: 0.78rem; font-weight: 700; color: var(--signal);
      min-width: 28px; text-align: right; font-variant-numeric: tabular-nums;
    }
    .constraint-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px; flex: 1;
      background: rgba(255,255,255,0.08); outline: none; cursor: pointer;
      transition: background 0.2s ease;
    }
    .constraint-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: var(--signal); border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
    }
    .constraint-slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--signal); border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
    }

    /* ── Stats ── */
    .stats-row {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .stat-big {
      font-size: 1.6rem; font-weight: 700; color: var(--signal);
      font-variant-numeric: tabular-nums;
    }
    .stat-label {
      font-size: 0.7rem; color: rgba(255,255,255,0.2);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .sim-status {
      font-size: 0.82rem; color: rgba(255,255,255,0.3);
      letter-spacing: 0.03em;
    }
    .sim-status strong { color: var(--signal); font-weight: 700; }

    /* ── Slide nav ── */
    .slide-nav {
      display: flex; gap: 6px; padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: auto;
    }
    .nav-btn {
      width: 32px; height: 32px; border-radius: 5px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: rgba(255,255,255,0.3); font-size: 16px;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  </style>
</head>
<body>

  <div class="layout">
    <div class="left-panel">

      <div style="margin-bottom:4px;">
        <div class="panel-label">Goals + Constraints</div>
        <div class="panel-title">Wide, then deep.</div>
      </div>

      <div class="panel-section">
        <div class="section-label">Explore</div>
        <div class="action-row">
          <button class="sim-btn" id="btnBreadth">↔ Breadth</button>
          <button class="sim-btn" id="btnDepth">↕ Depth</button>
          <button class="sim-btn" id="btnReset">Reset</button>
        </div>
        <div class="slider-row" style="margin-top:8px;">
          <span class="slider-label">Count</span>
          <input type="range" id="countSlider" class="constraint-slider" min="1" max="30" value="1" step="1">
          <span class="slider-value" id="countVal">1</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">Constraints</div>
        <div class="ck-grid">
          <label class="ck-row"><input type="checkbox" class="ck-input" data-preset="gestalt"><span class="ck-box"></span><span class="ck-text">Gestalt</span></label>
          <label class="ck-row"><input type="checkbox" class="ck-input" data-preset="a11y"><span class="ck-box"></span><span class="ck-text">Accessible colors</span></label>
          <label class="ck-row"><input type="checkbox" class="ck-input" data-preset="brand"><span class="ck-box"></span><span class="ck-text">Brand</span></label>
          <label class="ck-row"><input type="checkbox" class="ck-input" data-preset="layout"><span class="ck-box"></span><span class="ck-text">Layout scope</span></label>
          <label class="ck-row"><input type="checkbox" class="ck-input" data-preset="platform"><span class="ck-box"></span><span class="ck-text">Platform</span></label>
          <label class="ck-row"><input type="checkbox" class="ck-input" data-preset="type"><span class="ck-box"></span><span class="ck-text">Typography</span></label>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">Fine-tune</div>
        <div class="slider-grid">
          <div class="slider-row"><span class="slider-label">Min R</span><input type="range" id="minRadiusSlider" class="constraint-slider" min="0" max="80" value="0" step="1"><span class="slider-value" id="minRadiusVal">0%</span></div>
          <div class="slider-row"><span class="slider-label">Max R</span><input type="range" id="constraintSlider" class="constraint-slider" min="0" max="80" value="0" step="1"><span class="slider-value" id="constraintVal">100%</span></div>
          <div class="slider-row"><span class="slider-label">Angle</span><input type="range" id="angleSlider" class="constraint-slider" min="10" max="360" value="360" step="5"><span class="slider-value" id="angleVal">360°</span></div>
          <div class="slider-row"><span class="slider-label">Dir</span><input type="range" id="dirSlider" class="constraint-slider" min="0" max="360" value="0" step="5"><span class="slider-value" id="dirVal">0°</span></div>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">Discovery</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div><div class="stat-big" id="genCounter">0</div><div class="stat-label">clicks</div></div>
          <div><div class="stat-big" id="coveragePct">0%</div><div class="stat-label">explored</div></div>
          <div><div class="stat-big" id="efficiencyPct">—</div><div class="stat-label">per click</div></div>
        </div>
        <!-- Visual bar: explored vs unexplored -->
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
          <div style="flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;position:relative;">
            <div id="coverageBar" style="height:100%;width:0%;background:var(--signal);border-radius:3px;transition:width 0.4s ease;"></div>
          </div>
          <span id="unexploredPct" style="font-size:0.65rem;color:rgba(255,255,255,0.2);min-width:50px;text-align:right;">100% left</span>
        </div>
        <div class="sim-status" id="status" style="margin-top:6px;">ready</div>
      </div>

      <div class="slide-nav">
        <div class="nav-btn" id="slideNavPrev">‹</div>
        <div class="nav-btn" id="slideNavNext">›</div>
        <span style="font-size:0.45rem;color:rgba(255,255,255,0.12);margin-left:6px;">slides</span>
      </div>

    </div>
    <div id="viewer"></div>
  </div>

  <script>
    document.getElementById('slideNavPrev').addEventListener('click', function(e) {
      e.stopPropagation();
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'keydown', key: 'ArrowLeft' }, '*');
      }
    });
    document.getElementById('slideNavNext').addEventListener('click', function(e) {
      e.stopPropagation();
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'keydown', key: 'ArrowRight' }, '*');
      }
    });
  </script>

  <!-- Forward ALL arrow keys to parent slide deck -->
  <script>
    window.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        e.stopPropagation();
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'keydown', key: e.key }, '*');
        }
      }
    }, true);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function () {
  'use strict';

  var container = document.getElementById('viewer');
  var W = container.clientWidth || 820;
  var H = container.clientHeight || 580;
  var DISC_R = 5;

  // ── Scene ──
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f0d0b);
  scene.fog = new THREE.FogExp2(0x0f0d0b, 0.03);

  var camera = new THREE.PerspectiveCamera(40, W / H, 0.01, 500);
  camera.position.set(5, 9, 11);
  camera.lookAt(0, 1, 0);

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);
  renderer.domElement.style.borderRadius = '16px';

  // Resize handler
  window.addEventListener('resize', function () {
    W = container.clientWidth || 820;
    H = container.clientHeight || 580;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = false;
  controls.minDistance = 2;
  controls.maxDistance = 50;
  controls.maxPolarAngle = Math.PI * 0.48;
  controls.target.set(0, 1, 0);
  controls.autoRotate = false;
  controls.enablePan = true;
  controls.mouseButtons = {
    LEFT: THREE.MOUSE.ROTATE,
    MIDDLE: THREE.MOUSE.PAN,
    RIGHT: THREE.MOUSE.PAN
  };
  controls.panSpeed = 1.2;

  // ── Bright lighting ──
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  var dir1 = new THREE.DirectionalLight(0xf0ede8, 0.9);
  dir1.position.set(6, 14, 8);
  scene.add(dir1);
  var dir2 = new THREE.DirectionalLight(0x8888bb, 0.35);
  dir2.position.set(-5, 8, -6);
  scene.add(dir2);

  // ── Disc ──
  var disc = new THREE.Mesh(
    new THREE.CylinderGeometry(DISC_R, DISC_R, 0.08, 80),
    new THREE.MeshStandardMaterial({ color: 0x1e1a16, roughness: 0.8, metalness: 0.05 })
  );
  disc.position.y = -0.04;
  scene.add(disc);

  // Edge
  var edge = new THREE.Mesh(
    new THREE.TorusGeometry(DISC_R, 0.03, 8, 128),
    new THREE.MeshBasicMaterial({ color: 0x555555 })
  );
  edge.rotation.x = Math.PI / 2;
  edge.position.y = 0.01;
  scene.add(edge);

  // ── Constraint ring — visible boundary that shrinks ──
  var constraintPct = 0; // 0 = full disc, 80 = small area
  var constraintRing = new THREE.Mesh(
    new THREE.TorusGeometry(DISC_R, 0.035, 12, 128),
    new THREE.MeshBasicMaterial({ color: 0xf0ede8, transparent: true, opacity: 0 })
  );
  constraintRing.rotation.x = Math.PI / 2;
  constraintRing.position.y = 0.06;
  scene.add(constraintRing);

  // Excluded area outside constraint — dark overlay (not orange)
  var constraintFill = new THREE.Mesh(
    new THREE.RingGeometry(0, DISC_R, 64),
    new THREE.MeshBasicMaterial({
      color: 0x000000, transparent: true, opacity: 0, side: THREE.DoubleSide
    })
  );
  constraintFill.rotation.x = -Math.PI / 2;
  constraintFill.position.y = 0.055;
  scene.add(constraintFill);

  function getConstraintRadius() {
    return DISC_R * (1 - constraintPct / 100);
  }

  // ── Min radius constraint ──
  var minRadiusPct = 0; // 0 = no inner exclusion, 80 = huge inner hole

  var minRing = new THREE.Mesh(
    new THREE.TorusGeometry(0.01, 0.025, 12, 128),
    new THREE.MeshBasicMaterial({ color: 0xf0ede8, transparent: true, opacity: 0 })
  );
  minRing.rotation.x = Math.PI / 2;
  minRing.position.y = 0.06;
  scene.add(minRing);

  var minFill = new THREE.Mesh(
    new THREE.CircleGeometry(0.01, 64),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0, side: THREE.DoubleSide })
  );
  minFill.rotation.x = -Math.PI / 2;
  minFill.position.y = 0.056;
  scene.add(minFill);

  function getMinRadius() {
    return DISC_R * (minRadiusPct / 100);
  }

  function updateConstraintVisuals() {
    var cr = getConstraintRadius();
    var mr = getMinRadius();
    var tMax = constraintPct / 80;
    var tMin = minRadiusPct / 80;

    // Max boundary ring
    constraintRing.geometry.dispose();
    constraintRing.geometry = new THREE.TorusGeometry(cr, 0.025, 12, 128);
    constraintRing.material.opacity = tMax * 0.4;

    // Dark overlay outside max radius
    constraintFill.geometry.dispose();
    constraintFill.geometry = new THREE.RingGeometry(cr, DISC_R, 64);
    constraintFill.material.opacity = tMax * 0.55;

    // Min boundary ring
    minRing.geometry.dispose();
    minRing.geometry = new THREE.TorusGeometry(Math.max(0.01, mr), 0.025, 12, 128);
    minRing.material.opacity = tMin * 0.4;

    // Dark overlay inside min radius
    minFill.geometry.dispose();
    minFill.geometry = new THREE.CircleGeometry(Math.max(0.01, mr), 64);
    minFill.material.opacity = tMin * 0.55;
  }

  // ── Angle cone constraint ──
  var coneAngleDeg = 360; // full circle
  var coneCenterAngle = 0; // direction the cone faces (radians), 0 = +X

  // Cone wedge visual — dark overlay on the BLOCKED angle area
  var coneMesh = new THREE.Mesh(
    new THREE.CircleGeometry(DISC_R, 64, 0, Math.PI * 2),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0, side: THREE.DoubleSide })
  );
  coneMesh.rotation.x = Math.PI / 2;
  coneMesh.position.y = 0.052;
  scene.add(coneMesh);

  // Edge lines — subtle white
  var coneLineMat = new THREE.LineBasicMaterial({ color: 0xf0ede8, transparent: true, opacity: 0 });
  var coneLine1 = new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.06, 0), new THREE.Vector3(DISC_R, 0.06, 0)
  ]), coneLineMat.clone());
  var coneLine2 = new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.06, 0), new THREE.Vector3(DISC_R, 0.06, 0)
  ]), coneLineMat.clone());
  scene.add(coneLine1);
  scene.add(coneLine2);

  function getConeAngles() {
    var half = (coneAngleDeg / 2) * Math.PI / 180;
    return { min: coneCenterAngle - half, max: coneCenterAngle + half, half: half };
  }

  function randomAngleInCone() {
    if (coneAngleDeg >= 360) return Math.random() * Math.PI * 2;
    var cone = getConeAngles();
    return cone.min + Math.random() * (cone.max - cone.min);
  }

  function updateConeVisuals() {
    var show = coneAngleDeg < 360;
    var cone = getConeAngles();
    var cr = getConstraintRadius();

    if (show) {
      // Dark overlay on the blocked area (outside the allowed cone)
      var coneRad = coneAngleDeg * Math.PI / 180;
      var blockedStart = cone.max;
      var blockedAngle = Math.PI * 2 - coneRad;

      coneMesh.geometry.dispose();
      coneMesh.geometry = new THREE.CircleGeometry(DISC_R * 1.01, 64, blockedStart, blockedAngle);
      coneMesh.material.opacity = 0.5;

      // Subtle white edge lines at cone boundaries
      var r = cr > 0 ? cr : DISC_R;
      var p1 = new THREE.Vector3(Math.cos(cone.min) * r, 0.06, Math.sin(cone.min) * r);
      var p2 = new THREE.Vector3(Math.cos(cone.max) * r, 0.06, Math.sin(cone.max) * r);
      var origin = new THREE.Vector3(0, 0.06, 0);

      coneLine1.geometry.dispose();
      coneLine1.geometry = new THREE.BufferGeometry().setFromPoints([origin, p1]);
      coneLine1.material.opacity = 0.3;

      coneLine2.geometry.dispose();
      coneLine2.geometry = new THREE.BufferGeometry().setFromPoints([origin, p2]);
      coneLine2.material.opacity = 0.3;
    } else {
      coneMesh.material.opacity = 0;
      coneLine1.material.opacity = 0;
      coneLine2.material.opacity = 0;
    }
  }

  // ── Grid dots — bigger, brighter ──
  var gMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 });
  var gGeo = new THREE.SphereGeometry(0.045, 6, 6);
  for (var gx = -DISC_R; gx <= DISC_R; gx += 0.6) {
    for (var gz = -DISC_R; gz <= DISC_R; gz += 0.6) {
      if (gx * gx + gz * gz > DISC_R * DISC_R * 0.92) continue;
      var dd = new THREE.Mesh(gGeo, gMat);
      dd.position.set(gx, 0.05, gz);
      scene.add(dd);
    }
  }

  // Center
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xf0ede8, transparent: true, opacity: 0.6 })
  ).translateY(0.1));

  // ── Axis labels as sprites ──
  function makeTextSprite(text, pos, color, size) {
    var canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    var ctx = canvas.getContext('2d');
    ctx.font = (size || 20) + 'px Inter, sans-serif';
    ctx.fillStyle = color || 'rgba(255,255,255,0.3)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 32);
    var tex = new THREE.CanvasTexture(canvas);
    var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
    var sprite = new THREE.Sprite(mat);
    sprite.position.copy(pos);
    sprite.scale.set(2.5, 0.625, 1);
    return sprite;
  }

  scene.add(makeTextSprite('idea space', new THREE.Vector3(0, 0.08, DISC_R + 0.7), 'rgba(255,255,255,0.18)', 18));
  scene.add(makeTextSprite('quality ↑', new THREE.Vector3(-DISC_R - 0.8, 2.2, 0), 'rgba(255,255,255,0.18)', 18));

  // ── Raycaster for peak interaction ──
  var raycaster = new THREE.Raycaster();
  var mouse = new THREE.Vector2();
  var peakMeshes = []; // { mesh, gen, score } — filled during bake
  var hoveredPeak = null;

  // Tooltip element
  var tooltip = document.createElement('div');
  tooltip.style.cssText = 'position:absolute;pointer-events:none;background:rgba(15,13,11,0.9);border:1px solid rgba(196,62,28,0.4);border-radius:6px;padding:6px 10px;font-size:0.65rem;color:#f0ede8;letter-spacing:0.03em;display:none;white-space:nowrap;z-index:10;font-family:Inter,sans-serif;';
  container.style.position = 'relative';
  container.appendChild(tooltip);

  renderer.domElement.addEventListener('mousemove', function (e) {
    var rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    var hits = raycaster.intersectObjects(peakMeshes.map(function (p) { return p.mesh; }));

    if (hits.length > 0) {
      var hit = hits[0].object;
      var peak = peakMeshes.find(function (p) { return p.mesh === hit; });
      if (peak) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
        tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
        tooltip.innerHTML = 'Gen <strong style="color:#c43e1c;">' + peak.gen + '</strong> · score <strong style="color:#c43e1c;">' + peak.score + '%</strong>';
        renderer.domElement.style.cursor = 'pointer';
        hoveredPeak = peak;
      }
    } else {
      tooltip.style.display = 'none';
      renderer.domElement.style.cursor = 'grab';
      hoveredPeak = null;
    }
  });

  // ── Coverage tracking ──
  // Approximate % of disc area covered by landing points (using grid buckets)
  var COVERAGE_GRID = 20;
  var coverageBuckets = {};
  function addCoveragePoint(x, z) {
    var bx = Math.floor((x / DISC_R + 1) * COVERAGE_GRID / 2);
    var bz = Math.floor((z / DISC_R + 1) * COVERAGE_GRID / 2);
    coverageBuckets[bx + ',' + bz] = true;
  }
  function getCoveragePct() {
    // Count buckets inside the available area (constraint radius + cone angle)
    var cr = getConstraintRadius();
    var mr = getMinRadius();
    var crNorm = cr / DISC_R;
    var mrNorm = mr / DISC_R;
    var cone = getConeAngles();
    var useCone = coneAngleDeg < 360;

    var totalBuckets = 0;
    var filled = 0;
    for (var bx = 0; bx < COVERAGE_GRID; bx++) {
      for (var bz = 0; bz < COVERAGE_GRID; bz++) {
        var nx = (bx / COVERAGE_GRID * 2 - 1);
        var nz = (bz / COVERAGE_GRID * 2 - 1);
        var r = Math.sqrt(nx * nx + nz * nz);

        if (r > 1) continue;
        if (r > crNorm) continue;
        if (r < mrNorm) continue;
        if (useCone && r > 0.05) {
          var angle = Math.atan2(nz, nx);
          var diff = angle - coneCenterAngle;
          diff = ((diff + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
          if (Math.abs(diff) > cone.half) continue;
        }

        totalBuckets++;
        if (coverageBuckets[bx + ',' + bz]) filled++;
      }
    }
    if (totalBuckets === 0) return 0;
    return Math.min(100, Math.round(filled / totalBuckets * 100));
  }

  // ── Groups ──
  var bakedGroup = new THREE.Group();
  scene.add(bakedGroup);
  var liveGroup = new THREE.Group();
  scene.add(liveGroup);

  // ── Colors ──
  // ── Colors — position-based color wheel ──
  // Hue from angle on disc, saturation from distance (pastel at center, vivid at edge)
  function colorAtPosition(x, z) {
    var angle = Math.atan2(z, x);
    var hue = ((angle + Math.PI * 2) % (Math.PI * 2)) / (Math.PI * 2);
    var dist = Math.min(1, Math.sqrt(x * x + z * z) / DISC_R);
    var sat = 0.15 + dist * 0.75;       // soft pink at center → bright red at edge
    var lit = 0.78 - dist * 0.25;       // light pastel center → rich saturated edge
    var c = new THREE.Color();
    c.setHSL(hue, sat, lit);
    return c;
  }

  // ── Reusable geo ──
  var geoSm = new THREE.SphereGeometry(0.05, 8, 8);
  var geoMd = new THREE.SphereGeometry(0.08, 10, 10);
  var geoLg = new THREE.SphereGeometry(0.12, 12, 12);

  function makeTube(path, color, opacity, radius) {
    if (path.length < 2) return new THREE.Group();
    var curve = new THREE.CatmullRomCurve3(path);
    var segs = Math.min(64, Math.max(4, path.length));
    var geo = new THREE.TubeGeometry(curve, segs, radius || 0.03, 6, false);
    var mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: opacity });
    return new THREE.Mesh(geo, mat);
  }

  function mkMarker(pos, geo, color, opacity) {
    var mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: opacity });
    var m = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    return m;
  }

  function mkBeam(x, z, height, color, opacity) {
    var p0 = new THREE.Vector3(x, 0.05, z);
    var p1 = new THREE.Vector3(x, height, z);
    var curve = new THREE.LineCurve3(p0, p1);
    var geo = new THREE.TubeGeometry(curve, 2, 0.025, 6, false);
    var mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: opacity });
    return new THREE.Mesh(geo, mat);
  }

  function mkRing(x, y, z, r, color, opacity) {
    var geo = new THREE.TorusGeometry(r, 0.018, 8, 48);
    var mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: opacity });
    var m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    m.rotation.x = Math.PI / 2;
    return m;
  }

  // ── Agent ──
  function Agent(idx, startPos) {
    this.idx = idx;
    this.phase = 'wide';
    this.maxR = getConstraintRadius();
    this.minR = getMinRadius();

    // Start from given position or center
    this.startX = startPos ? startPos.x : 0;
    this.startZ = startPos ? startPos.z : 0;

    this.wAngle = randomAngleInCone();
    // Distance ranges between minR and maxR
    var innerR = this.minR;
    var outerR = this.maxR * 0.93;
    this.wDist = innerR + Math.random() * Math.max(0.1, outerR - innerR);
    this.wSpeed = 0.028 + Math.random() * 0.014;
    this.wProg = 0;
    this.trail = [{ x: this.startX, z: this.startZ }];
    this.landing = null;

    this.dSpeed = 0;
    this.dProg = 0;
    this.dTrail = [];
    this.dMaxH = 0;
    this.dBest = null;
  }

  Agent.prototype.tick = function () {
    if (this.phase === 'wide') {
      this.wProg += this.wSpeed;
      if (this.wProg > 1) this.wProg = 1;
      var t = this.wProg;
      var d = t * this.wDist;
      var drift = Math.sin(t * 3.1 + this.wAngle) * 0.08 * t;
      var x = this.startX + Math.cos(this.wAngle) * d + Math.cos(this.wAngle + 1.57) * drift;
      var z = this.startZ + Math.sin(this.wAngle) * d + Math.sin(this.wAngle + 1.57) * drift;
      var r = Math.sqrt(x * x + z * z);
      if (r > this.maxR * 0.93) { x *= this.maxR * 0.93 / r; z *= this.maxR * 0.93 / r; }
      this.trail.push({ x: x, z: z });
      addCoveragePoint(x, z);

      if (this.wProg >= 1) {
        this.landing = { x: x, z: z };
        this.phase = 'landed';// wait for user to choose breadth or depth
      }
    } else if (this.phase === 'deep') {
      this.dProg += this.dSpeed;
      if (this.dProg > 1) this.dProg = 1;
      var b = this.landing, t = this.dProg;
      // Straight vertical rise from landing point — smooth ease
      var ease = t * t * (3 - 2 * t); // smoothstep
      var y = 0.1 + this.dMaxH * ease;
      // Tiny XZ jitter that converges to zero
      var jx = (Math.random() - 0.5) * 0.03 * (1 - t);
      var jz = (Math.random() - 0.5) * 0.03 * (1 - t);
      this.dTrail.push({ x: b.x + jx, y: y, z: b.z + jz });
      if (!this.dBest || y > this.dBest.y) this.dBest = { x: b.x + jx, y: y, z: b.z + jz };

      if (this.dProg >= 1) {
        this.dBest = {
          x: b.x,
          y: this.dMaxH * 0.95 + 0.1,
          z: b.z
        };
        this.phase = 'done';
      }
    }
  };

  Agent.prototype.startDeep = function () {
    if (this.phase !== 'landed') return;
    this.phase = 'deep';
    this.dSpeed = 0.04 + Math.random() * 0.02;
    this.dMaxH = 0.8 + Math.random() * 3.2;
    this.dTrail = [{ x: this.landing.x, y: 0.1, z: this.landing.z }];
  };

  // Sample trail points for tube (every Nth)
  function samplePts(arr, isDeep) {
    var step = Math.max(1, Math.floor(arr.length / 30));
    var pts = [];
    for (var i = 0; i < arr.length; i += step) {
      var p = arr[i];
      pts.push(new THREE.Vector3(p.x, isDeep ? p.y : 0.08, p.z));
    }
    var last = arr[arr.length - 1];
    pts.push(new THREE.Vector3(last.x, isDeep ? last.y : 0.08, last.z));
    return pts;
  }

  Agent.prototype.buildLive = function (group) {
    // Color from current tip position
    var tipPt = this.trail.length ? this.trail[this.trail.length - 1] : { x: 0, z: 0 };
    var c = colorAtPosition(tipPt.x, tipPt.z);

    if (this.trail.length > 2) {
      group.add(makeTube(samplePts(this.trail, false), c, 0.75, 0.035));
    }
    if (this.dTrail.length > 2) {
      var dc = this.landing ? colorAtPosition(this.landing.x, this.landing.z) : c;
      group.add(makeTube(samplePts(this.dTrail, true), dc, 0.55, 0.025));
    }
    if (this.landing) {
      var lc = colorAtPosition(this.landing.x, this.landing.z);
      group.add(mkMarker(new THREE.Vector3(this.landing.x, 0.12, this.landing.z), geoMd, lc, 0.85));
    }
    // Tip dot
    var tip;
    if (this.phase === 'wide' && this.trail.length) {
      var t = this.trail[this.trail.length - 1];
      tip = new THREE.Vector3(t.x, 0.14, t.z);
    } else if (this.phase === 'deep' && this.dTrail.length) {
      var d = this.dTrail[this.dTrail.length - 1];
      tip = new THREE.Vector3(d.x, d.y, d.z);
    }
    if (tip) group.add(mkMarker(tip, geoMd, c, 1));
  };

  Agent.prototype.bake = function () {
    // Color from landing position on the disc
    var lx = this.landing ? this.landing.x : 0;
    var lz = this.landing ? this.landing.z : 0;
    var c = colorAtPosition(lx, lz);

    if (this.trail.length > 2) {
      bakedGroup.add(makeTube(samplePts(this.trail, false), c, 0.5, 0.035));
    }
    if (this.landing) {
      bakedGroup.add(mkMarker(new THREE.Vector3(this.landing.x, 0.12, this.landing.z), geoMd, c, 0.7));
      addCoveragePoint(this.landing.x, this.landing.z);
      for (var i = 0; i < this.trail.length; i += 4) {
        addCoveragePoint(this.trail[i].x, this.trail[i].z);
      }
    }
    if (this.dTrail.length > 2) {
      bakedGroup.add(makeTube(samplePts(this.dTrail, true), c, 0.35, 0.02));
    }
    if (this.dBest) {
      var b = this.dBest;
      var heightNorm = Math.min(1, b.y / 3.5);

      var beamOpacity = 0.15 + heightNorm * 0.5;
      bakedGroup.add(mkBeam(b.x, b.z, b.y + 0.05, c, beamOpacity));

      var peakOpacity = 0.25 + heightNorm * 0.65;
      var peakColor = new THREE.Color().copy(c);
      peakColor.lerp(new THREE.Color(0xffffff), heightNorm * 0.3);
      var peakMesh = mkMarker(new THREE.Vector3(b.x, b.y, b.z), geoMd, peakColor, peakOpacity);
      bakedGroup.add(peakMesh);
      peakMeshes.push({ mesh: peakMesh, gen: this.gen, score: Math.round(heightNorm * 100) });

      if (heightNorm > 0.6) {
        var glow = new THREE.PointLight(c, heightNorm * 0.35, 3);
        glow.position.set(b.x, b.y, b.z);
        bakedGroup.add(glow);
      }
    }
  };

  // ── State ──
  var agents = [];
  var totalGens = 0;
  var totalClicks = 0;
  var running = false;

  // Sequential mode — tracks the last landing point and color index
  var seqLanding = null; // { x, z } of last sequential agent's landing
  var seqColorIdx = 0;   // keeps same color for the sequential chain

  function clearLive() {
    while (liveGroup.children.length) liveGroup.remove(liveGroup.children[0]);
  }

  function spawn(count) {
    for (var i = 0; i < count; i++) {
      agents.push(new Agent(totalGens));
      totalGens++;
    }
    running = true;
    updateUI();
  }

  function spawnSequential() {
    var a = new Agent(seqColorIdx, seqLanding);
    agents.push(a);
    totalGens++;
    running = true;
    updateUI();
  }

  function tickAll() {
    var active = 0;
    var landed = 0;
    for (var i = 0; i < agents.length; i++) {
      if (agents[i].phase === 'wide' || agents[i].phase === 'deep') {
        agents[i].tick();
        active++;
      } else if (agents[i].phase === 'landed') {
        landed++;
      }
    }

    clearLive();
    for (var i = 0; i < agents.length; i++) {
      if (agents[i].phase !== 'done') {
        agents[i].buildLive(liveGroup);
      }
    }

    // All animating agents finished — but some may be landed (waiting)
    if (active === 0 && running) {
      // Bake only the done agents
      var remaining = [];
      for (var i = 0; i < agents.length; i++) {
        if (agents[i].phase === 'done') {
          agents[i].bake();
          if (agents[i].landing) {
            seqLanding = { x: agents[i].landing.x, z: agents[i].landing.z };
          }
        } else {
          remaining.push(agents[i]);
        }
      }
      agents = remaining;
      if (agents.length === 0) {
        running = false;
        clearLive();
      }
    }
    updateUI();
  }

  function resetAll() {
    agents = []; totalGens = 0; totalClicks = 0; running = false;
    seqLanding = null;
    seqColorIdx = Math.floor(Math.random() * 15);
    peakMeshes = [];
    coverageBuckets = {};
    clearLive();
    while (bakedGroup.children.length) bakedGroup.remove(bakedGroup.children[0]);
    updateUI();
  }

  function updateUI() {
    var counter = document.getElementById('genCounter');
    var coverageEl = document.getElementById('coveragePct');
    var effEl = document.getElementById('efficiencyPct');
    var barEl = document.getElementById('coverageBar');
    var unexpEl = document.getElementById('unexploredPct');
    var status = document.getElementById('status');
    var active = agents.filter(function (a) { return a.phase !== 'done'; }).length;

    counter.textContent = totalClicks;

    var cov = getCoveragePct();
    coverageEl.textContent = cov + '%';
    if (barEl) barEl.style.width = cov + '%';
    if (unexpEl) unexpEl.textContent = (100 - cov) + '% left';

    if (totalClicks > 0) {
      var eff = (cov / totalClicks).toFixed(1);
      effEl.textContent = eff + '%';
    } else {
      effEl.textContent = '—';
    }

    if (!running && totalGens === 0 && agents.length === 0) status.textContent = 'ready';
    else if (active > 0) status.textContent = active + ' exploring';
    else if (agents.length > 0) status.textContent = 'breadth or depth?';
    else status.textContent = cov + '% of idea space covered';
  }

  // ── Loop ──
  function animate() {
    requestAnimationFrame(animate);
    if (running) tickAll();
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── Controls ──

  var spawnCount = 1;
  document.getElementById('countSlider').addEventListener('input', function () {
    spawnCount = parseInt(this.value);
    document.getElementById('countVal').textContent = spawnCount;
  });

  // Breadth: spawns `spawnCount` agents. If count=1, sequential chain. If >1, from center.
  document.getElementById('btnBreadth').addEventListener('click', function () {
    totalClicks++;
    // Bake any landed agents first
    var remaining = [];
    for (var i = 0; i < agents.length; i++) {
      if (agents[i].phase === 'landed') {
        agents[i].phase = 'done';
        agents[i].bake();
        if (agents[i].landing) {
          seqLanding = { x: agents[i].landing.x, z: agents[i].landing.z };
        }
      } else {
        remaining.push(agents[i]);
      }
    }
    agents = remaining;

    if (spawnCount <= 1) {
      spawnSequential();
    } else {
      seqLanding = null;
      seqColorIdx = Math.floor(Math.random() * 15);
      spawn(spawnCount);
    }
  });

  // Depth: trigger deep on all landed agents
  document.getElementById('btnDepth').addEventListener('click', function () {
    totalClicks++;
    var triggered = false;
    for (var i = 0; i < agents.length; i++) {
      if (agents[i].phase === 'landed') {
        agents[i].startDeep();
        triggered = true;
      }
    }
    if (triggered) running = true;
    updateUI();
  });

  document.getElementById('btnReset').addEventListener('click', resetAll);

  // ── Constraint slider (max radius) ──
  var slider = document.getElementById('constraintSlider');
  var valLabel = document.getElementById('constraintVal');
  slider.addEventListener('input', function () {
    constraintPct = parseInt(slider.value);
    var spawnable = Math.round(100 - constraintPct);
    valLabel.textContent = spawnable + '%';
    updateConstraintVisuals();
    updateConeVisuals();
  });

  // ── Min radius slider ──
  var minSlider = document.getElementById('minRadiusSlider');
  var minLabel = document.getElementById('minRadiusVal');
  minSlider.addEventListener('input', function () {
    minRadiusPct = parseInt(minSlider.value);
    minLabel.textContent = minRadiusPct + '%';
    updateConstraintVisuals();
  });

  // ── Angle slider ──
  var angleSlider = document.getElementById('angleSlider');
  var angleLabel = document.getElementById('angleVal');
  angleSlider.addEventListener('input', function () {
    coneAngleDeg = parseInt(angleSlider.value);
    angleLabel.textContent = coneAngleDeg + '°';
    updateConeVisuals();
  });

  // ── Direction slider ──
  var dirSlider = document.getElementById('dirSlider');
  var dirLabel = document.getElementById('dirVal');
  dirSlider.addEventListener('input', function () {
    var deg = parseInt(dirSlider.value);
    dirLabel.textContent = deg + '°';
    coneCenterAngle = deg * Math.PI / 180;
    updateConeVisuals();
  });

  // ── Constraint presets ──
  var PRESETS = {
    gestalt:  { angle: -60, dir: 0, minR: 0, maxR: 0 },
    a11y:     { angle: 0, dir: 0, minR: 15, maxR: 0 },
    brand:    { angle: -40, dir: 45, minR: 0, maxR: 10 },
    layout:   { angle: 0, dir: 0, minR: 0, maxR: 15 },
    platform: { angle: -30, dir: 0, minR: 5, maxR: 5 },
    type:     { angle: 0, dir: 0, minR: 0, maxR: 12 }
  };

  function applyPresets() {
    var checks = document.querySelectorAll('.ck-input');
    var tAngle = 0, tDir = 0, tMinR = 0, tMaxR = 0;
    checks.forEach(function(cb) {
      if (cb.checked) {
        var p = PRESETS[cb.dataset.preset];
        if (p) { tAngle += p.angle; tDir += p.dir; tMinR += p.minR; tMaxR += p.maxR; }
      }
    });

    var targetAngle = Math.max(10, 360 + tAngle);
    var targetDir = ((tDir % 360) + 360) % 360;
    var targetMinR = Math.min(80, tMinR);
    var targetMaxR = Math.min(80, tMaxR);

    // Animate from current values to targets
    var startAngle = coneAngleDeg, startDir = coneCenterAngle * 180 / Math.PI;
    var startMinR = minRadiusPct, startMaxR = constraintPct;
    var duration = 400, startTime = performance.now();

    function lerp(a, b, t) { return a + (b - a) * t; }
    function ease(t) { return t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

    function step(now) {
      var t = Math.min(1, (now - startTime) / duration);
      var e = ease(t);

      coneAngleDeg = lerp(startAngle, targetAngle, e);
      coneCenterAngle = lerp(startDir, targetDir, e) * Math.PI / 180;
      minRadiusPct = lerp(startMinR, targetMinR, e);
      constraintPct = lerp(startMaxR, targetMaxR, e);

      // Update slider positions
      document.getElementById('angleSlider').value = Math.round(coneAngleDeg);
      document.getElementById('angleVal').textContent = Math.round(coneAngleDeg) + '°';
      document.getElementById('dirSlider').value = Math.round(coneCenterAngle * 180 / Math.PI);
      document.getElementById('dirVal').textContent = Math.round(coneCenterAngle * 180 / Math.PI) + '°';
      document.getElementById('minRadiusSlider').value = Math.round(minRadiusPct);
      document.getElementById('minRadiusVal').textContent = Math.round(minRadiusPct) + '%';
      document.getElementById('constraintSlider').value = Math.round(constraintPct);
      document.getElementById('constraintVal').textContent = Math.round(100 - constraintPct) + '%';

      updateConstraintVisuals();
      updateConeVisuals();

      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  document.querySelectorAll('.ck-input').forEach(function(cb) {
    cb.addEventListener('change', applyPresets);
  });

  updateUI();
})();
</script>

</body>
