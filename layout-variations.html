<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composition & Layout — Layout Variations</title>
<link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-light: #eeeee4;
    --signal: #c43e1c;
    --text-dark: #2a1a0e;
    --text-muted: rgba(42,26,14,0.5);
    --font-display: 'Young Serif', Georgia, serif;
    --font-body: 'Inter', sans-serif;
  }
  body { background: #1a1a1a; color: #eee; font-family: var(--font-body); padding: 24px; }
  h1 { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: 8px; color: #f0ede8; }
  .intro { font-size: 0.8rem; color: #888; margin-bottom: 24px; line-height: 1.6; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 1200px) { .grid { grid-template-columns: 1fr; } }

  .variation {
    background: var(--bg-light);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16/9;
  }
  .variation .tag {
    position: absolute; top: 8px; left: 8px; z-index: 5;
    background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px; letter-spacing: 0.06em;
  }

  /* Each variation is a mini slide mockup */
  .v-inner {
    width: 100%; height: 100%;
    display: grid; gap: 0;
    color: var(--text-dark);
  }

  .v-left {
    display: flex; flex-direction: column; justify-content: center;
    padding: 5% 6%;
  }
  .v-left .cat { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--signal); margin-bottom: 4px; }
  .v-left h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 400; margin-bottom: 6px; color: var(--text-dark); }
  .v-left p { font-size: 0.6rem; line-height: 1.5; color: rgba(42,26,14,0.6); }

  .v-right {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg-light); position: relative;
  }
  .v-right svg { border-radius: 4px; }

  .v-dots {
    display: flex; gap: 4px; align-items: center; justify-content: center;
  }
  .v-dots .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(42,26,14,0.2);
  }
  .v-dots .dot.active { background: var(--signal); transform: scale(1.3); }
  .v-dots .chev { font-size: 11px; color: rgba(42,26,14,0.3); padding: 0 4px; }
</style>
</head>
<body>

<h1>Slide 12 — Layout Variations</h1>
<p class="intro">20 variations of the Composition & Layout slide. Each shows a different split ratio, SVG size, and pagination placement. Pick the one that works best.</p>

<div class="grid" id="grid"></div>

<script>
(function() {
  // Mini SVG for preview (Rule of Thirds)
  function miniSVG(w, h) {
    var W = w, H = h;
    return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="display:block;border-radius:4px;">'
      + '<rect width="'+W+'" height="'+H+'" fill="#1a1a1a" rx="4"/>'
      + '<line x1="'+(W/3)+'" y1="0" x2="'+(W/3)+'" y2="'+H+'" stroke="#d4a053" stroke-width="1" opacity="0.6" stroke-dasharray="4 3"/>'
      + '<line x1="'+(2*W/3)+'" y1="0" x2="'+(2*W/3)+'" y2="'+H+'" stroke="#d4a053" stroke-width="1" opacity="0.6" stroke-dasharray="4 3"/>'
      + '<line x1="0" y1="'+(H/3)+'" x2="'+W+'" y2="'+(H/3)+'" stroke="#d4a053" stroke-width="1" opacity="0.6" stroke-dasharray="4 3"/>'
      + '<line x1="0" y1="'+(2*H/3)+'" x2="'+W+'" y2="'+(2*H/3)+'" stroke="#d4a053" stroke-width="1" opacity="0.6" stroke-dasharray="4 3"/>'
      + '<circle cx="'+(W/3)+'" cy="'+(H/3)+'" r="4" fill="#d4a053"/>'
      + '<circle cx="'+(2*W/3)+'" cy="'+(H/3)+'" r="4" fill="#d4a053"/>'
      + '<circle cx="'+(W/3)+'" cy="'+(2*H/3)+'" r="4" fill="#d4a053"/>'
      + '<circle cx="'+(2*W/3)+'" cy="'+(2*H/3)+'" r="4" fill="#d4a053"/>'
      + '</svg>';
  }

  function dotsHTML(pos) {
    return '<div class="v-dots" style="'+pos+'">'
      + '<span class="chev">‹</span>'
      + '<div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>'
      + '<div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>'
      + '<div class="dot"></div><div class="dot"></div>'
      + '<span class="chev">›</span>'
      + '</div>';
  }

  var variations = [
    // Split ratios
    { label: '1 · 50/50, SVG large, dots below SVG', split: '1fr 1fr', svgW: 320, svgH: 200, svgPct: '90%', dotsPos: 'below-svg', gap: '12px' },
    { label: '2 · 40/60, SVG large, dots below SVG', split: '2fr 3fr', svgW: 360, svgH: 225, svgPct: '92%', dotsPos: 'below-svg', gap: '12px' },
    { label: '3 · 35/65, SVG large, dots below SVG', split: '35fr 65fr', svgW: 380, svgH: 238, svgPct: '94%', dotsPos: 'below-svg', gap: '12px' },
    { label: '4 · 30/70, SVG xlarge, dots below SVG', split: '3fr 7fr', svgW: 400, svgH: 250, svgPct: '95%', dotsPos: 'below-svg', gap: '10px' },
    { label: '5 · 45/55, SVG medium, dots below SVG', split: '45fr 55fr', svgW: 300, svgH: 188, svgPct: '85%', dotsPos: 'below-svg', gap: '14px' },

    // Dots at bottom center of whole slide
    { label: '6 · 50/50, SVG large, dots bottom-center', split: '1fr 1fr', svgW: 320, svgH: 200, svgPct: '90%', dotsPos: 'bottom-center', gap: '12px' },
    { label: '7 · 40/60, SVG large, dots bottom-center', split: '2fr 3fr', svgW: 360, svgH: 225, svgPct: '92%', dotsPos: 'bottom-center', gap: '12px' },
    { label: '8 · 35/65, SVG xlarge, dots bottom-center', split: '35fr 65fr', svgW: 400, svgH: 250, svgPct: '95%', dotsPos: 'bottom-center', gap: '10px' },
    { label: '9 · 30/70, SVG xlarge, dots bottom-center', split: '3fr 7fr', svgW: 420, svgH: 263, svgPct: '96%', dotsPos: 'bottom-center', gap: '10px' },

    // Dots inline on left side
    { label: '10 · 50/50, SVG large, dots on left', split: '1fr 1fr', svgW: 320, svgH: 200, svgPct: '90%', dotsPos: 'left-bottom', gap: '12px' },
    { label: '11 · 40/60, SVG large, dots on left', split: '2fr 3fr', svgW: 360, svgH: 225, svgPct: '92%', dotsPos: 'left-bottom', gap: '12px' },
    { label: '12 · 35/65, SVG xlarge, dots on left', split: '35fr 65fr', svgW: 400, svgH: 250, svgPct: '95%', dotsPos: 'left-bottom', gap: '10px' },

    // SVG fills entire right, dots overlaid at bottom
    { label: '13 · 50/50, SVG fills right, dots overlay', split: '1fr 1fr', svgW: 400, svgH: 250, svgPct: '100%', dotsPos: 'overlay-bottom', gap: '0' },
    { label: '14 · 40/60, SVG fills right, dots overlay', split: '2fr 3fr', svgW: 440, svgH: 275, svgPct: '100%', dotsPos: 'overlay-bottom', gap: '0' },
    { label: '15 · 35/65, SVG fills right, dots overlay', split: '35fr 65fr', svgW: 460, svgH: 288, svgPct: '100%', dotsPos: 'overlay-bottom', gap: '0' },
    { label: '16 · 30/70, SVG fills right, dots overlay', split: '3fr 7fr', svgW: 480, svgH: 300, svgPct: '100%', dotsPos: 'overlay-bottom', gap: '0' },

    // Stacked: text on top, SVG full-width below
    { label: '17 · Stacked: text top, SVG bottom, dots below', split: 'stacked', svgW: 500, svgH: 240, svgPct: '80%', dotsPos: 'below-svg', gap: '12px' },
    { label: '18 · Stacked: text top, SVG bottom, dots overlay', split: 'stacked', svgW: 560, svgH: 270, svgPct: '85%', dotsPos: 'overlay-bottom', gap: '0' },

    // Text overlay on SVG
    { label: '19 · SVG full-bleed, text overlay left, dots bottom', split: 'overlay', svgW: 640, svgH: 360, svgPct: '100%', dotsPos: 'bottom-center', gap: '0' },
    { label: '20 · SVG full-bleed, text overlay left, dots overlay', split: 'overlay', svgW: 640, svgH: 360, svgPct: '100%', dotsPos: 'overlay-bottom', gap: '0' },
  ];

  var grid = document.getElementById('grid');

  variations.forEach(function(v) {
    var card = document.createElement('div');
    card.className = 'variation';

    var tag = '<div class="tag">' + v.label + '</div>';
    var svg = miniSVG(v.svgW, v.svgH);
    var html = '';

    if (v.split === 'stacked') {
      // Text on top, SVG below
      html = tag + '<div style="width:100%;height:100%;display:flex;flex-direction:column;">'
        + '<div class="v-left" style="padding:4% 6% 2%;flex:0 0 auto;">'
        + '<div class="cat">Composition</div><h3>Rule of Thirds</h3>'
        + '<p>Divide any frame into a 3×3 grid. Place key elements along the lines.</p>'
        + '</div>'
        + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:'+v.gap+';padding:0 4% 3%;">'
        + '<div style="width:'+v.svgPct+';max-width:'+v.svgW+'px;">'+svg+'</div>'
        + (v.dotsPos === 'below-svg' ? dotsHTML('') : '')
        + '</div>'
        + (v.dotsPos === 'overlay-bottom' ? dotsHTML('position:absolute;bottom:8px;left:50%;transform:translateX(-50%);') : '')
        + '</div>';
    } else if (v.split === 'overlay') {
      // SVG full-bleed, text overlaid
      html = tag + '<div style="width:100%;height:100%;position:relative;">'
        + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">'
        + '<div style="width:100%;height:100%;">'+miniSVG(640,360)+'</div></div>'
        + '<div style="position:absolute;left:0;top:0;bottom:0;width:45%;display:flex;flex-direction:column;justify-content:center;padding:5% 5%;background:linear-gradient(to right,rgba(238,238,228,0.92) 60%,rgba(238,238,228,0) 100%);">'
        + '<div class="cat">Composition</div><h3>Rule of Thirds</h3>'
        + '<p>Divide any frame into a 3×3 grid. Place key elements along the lines.</p>'
        + '</div>'
        + (v.dotsPos === 'bottom-center' ? dotsHTML('position:absolute;bottom:8px;left:50%;transform:translateX(-50%);') : '')
        + (v.dotsPos === 'overlay-bottom' ? dotsHTML('position:absolute;bottom:8px;right:12px;') : '')
        + '</div>';
    } else {
      // Side-by-side
      var leftContent = '<div class="v-left">'
        + '<div class="cat">Composition</div><h3>Rule of Thirds</h3>'
        + '<p>Divide any frame into a 3×3 grid. Place key elements along the lines or at the intersections, not dead center.</p>'
        + (v.dotsPos === 'left-bottom' ? '<div style="margin-top:12px;">'+dotsHTML('')+'</div>' : '')
        + '</div>';

      var rightContent = '<div class="v-right" style="gap:'+v.gap+';padding:3%;">'
        + '<div style="width:'+v.svgPct+';max-width:'+v.svgW+'px;">'+svg+'</div>'
        + (v.dotsPos === 'below-svg' ? dotsHTML('') : '')
        + (v.dotsPos === 'overlay-bottom' ? dotsHTML('position:absolute;bottom:8px;left:50%;transform:translateX(-50%);') : '')
        + '</div>';

      html = tag + '<div class="v-inner" style="grid-template-columns:'+v.split+';">'
        + leftContent + rightContent
        + '</div>'
        + (v.dotsPos === 'bottom-center' ? dotsHTML('position:absolute;bottom:8px;left:50%;transform:translateX(-50%);') : '');
    }

    card.innerHTML = html;
    grid.appendChild(card);
  });
})();
</script>

</body>
</html>
